    <form class="finalizar-compra" action="confirmacion.html" method="POST">
        <h1>Completa tus datos</h1>

        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" required>

        <label for="telefono">Número de Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" required>

        <label for="direccion">Dirección:</label>
        <input type="text" id="direccion" name="direccion" required>

        <label for="correo">Correo Electrónico:</label>
        <input type="email" id="correo" name="correo" required>

        <label for="confirmar_correo">Repita su Correo:</label>
        <input type="email" id="confirmar_correo" name="confirmar_correo" required>

        <button type="submit"><a href="confirmacion.html">Finalizar Compra</a></button>
    </form>
